<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🕊️ 私だけの美肌アプリ JS版</title>
</head>
<body style="font-family: sans-serif; background-color: #f0f2f6; padding: 15px; margin: 0;">
    
    <h2>🕊️ 私だけの美肌アプリ</h2>
    <p style="color: #666; font-size: 0.85em;">※画像は端末内だけで安全に処理されます。</p>

    <div style="background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
        <input type="file" id="imageInput" accept="image/png, image/jpeg" style="width: 100%;">
        
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

        <h4>✨ ペンと加工の調整</h4>
        
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button id="modeScrollBtn" style="flex: 1; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">🤚 スクロール</button>
            <button id="modeDrawBtn" style="flex: 1; padding: 12px; background: #e0e0e0; color: #333; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">🖊️ なぞる</button>
        </div>

        <label style="display: block; margin-bottom: 10px;">ツール: 
            <select id="drawMode" style="padding: 5px;">
                <option value="pen">🖊️ ペン</option>
                <option value="eraser">消しゴム</option>
            </select>
        </label>

        <label style="display: block; margin-bottom: 10px;">ペンの太さ: <input type="range" id="brushSize" min="5" max="150" value="40" style="width: 100%;"></label>
        <label style="display: block; margin-bottom: 10px;">美肌の強さ（透明度）: <input type="range" id="smoothFactor" min="0" max="100" value="20" style="width: 100%;"></label>
        <label style="display: block; margin-bottom: 20px;">色温度（青←→赤）: <input type="range" id="colorTemp" min="-50" max="50" value="0" style="width: 100%;"></label>

        <button id="processBtn" style="display: block; width: 100%; padding: 15px; background: #ff4b4b; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1em; cursor: pointer;">
            ✨ なぞった部分を美肌にする ✨
        </button>

        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button id="undoBtn" style="flex: 1; padding: 10px; cursor: pointer; border: 1px solid #ccc; border-radius: 5px; background: #fff;" disabled>↩️ 戻す</button>
            <button id="redoBtn" style="flex: 1; padding: 10px; cursor: pointer; border: 1px solid #ccc; border-radius: 5px; background: #fff;" disabled>やり直す ↪️</button>
        </div>
    </div>

    <h4>🖌️ 作業エリア</h4>
    <p style="font-size: 0.8em; color: #ff4b4b; margin-top: -10px;">※「なぞる」モードにしてから指で塗ってください</p>
    
    <div id="canvasContainer" style="position: relative; margin-top: 10px; width: 100%; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1);">
        <canvas id="imageCanvas" style="width: 100%; height: auto; display: block; border-radius: 8px;"></canvas>
        <canvas id="drawCanvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; touch-action: none; border-radius: 8px;"></canvas>
    </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 30px 0;">
    
    <h4>✨ 補正結果</h4>
    <div style="margin-top: 10px; background: white; padding: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
        <canvas id="resultCanvas" style="width: 100%; height: auto; display: block; border-radius: 5px;"></canvas>
    </div>

    <button id="saveBtn" style="display: block; width: 100%; padding: 15px; margin-top: 20px; margin-bottom: 40px; background: #28a745; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1em; cursor: pointer;">
        💾 補正した画像を保存する (JPG)
    </button>

    <canvas id="loupeCanvas" style="position: absolute; display: none; border: 2px solid #fff; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.5); pointer-events: none; z-index: 1000;"></canvas>

    <script async src="https://docs.opencv.org/4.8.0/opencv.js" type="text/javascript"></script>
    <script src="script.js"></script>
</body>
</html>
