<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🕊️ 私だけの美肌アプリ JS版</title>
</head>
<body style="font-family: sans-serif; background-color: #f0f2f6; padding: 20px;">
    
    <h2>🕊️ 私だけの美肌アプリ (完全ローカル版)</h2>
    <p style="color: #666; font-size: 0.9em;">※画像はサーバーに送信されず、この端末内だけで安全に処理されます。</p>

    <div style="background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
        <input type="file" id="imageInput" accept="image/png, image/jpeg">
        
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

        <h4>✨ ペンと加工の調整</h4>
        <label>ツール: 
            <select id="drawMode">
                <option value="pen">🖊️ ペン</option>
                <option value="eraser">消しゴム</option>
            </select>
        </label><br><br>

        <label>ペンの太さ: <input type="range" id="brushSize" min="5" max="100" value="30"></label><br><br>
        <label>美肌の強さ: <input type="range" id="smoothFactor" min="0" max="100" value="60"></label><br><br>
        <label>色温度（青←→赤）: <input type="range" id="colorTemp" min="-50" max="50" value="0"></label><br><br>

        <button id="processBtn" style="display: block; width: 100%; padding: 15px; margin-top: 10px; background: #ff4b4b; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1em; cursor: pointer;">
            ✨ なぞった部分を美肌にする ✨
        </button>

        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button id="undoBtn" style="flex: 1; padding: 10px; cursor: pointer; border: 1px solid #ccc; border-radius: 5px; background: #fff;" disabled>↩️ 描画を元に戻す</button>
            <button id="redoBtn" style="flex: 1; padding: 10px; cursor: pointer; border: 1px solid #ccc; border-radius: 5px; background: #fff;" disabled>描画をやり直す ↪️</button>
        </div>
    </div>

    <h4>🖌️ 作業エリア（ここをなぞる）</h4>
    <div id="canvasContainer" style="position: relative; margin-top: 10px;">
        <canvas id="imageCanvas"></canvas>
        <canvas id="drawCanvas" style="position: absolute; top: 0; left: 0;"></canvas>
        <canvas id="loupeCanvas" style="position: absolute; display: none; border: 2px solid #fff; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.5); pointer-events: none;"></canvas>
    </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 30px 0;">
    
    <h4>✨ 補正結果（プレビュー）</h4>
    <div style="margin-top: 10px; background: white; padding: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
        <canvas id="resultCanvas" style="max-width: 100%; height: auto;"></canvas>
    </div>

    <button id="saveBtn" style="display: block; width: 100%; padding: 15px; margin-top: 20px; margin-bottom: 40px; background: #28a745; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1em; cursor: pointer;">
        💾 補正した画像を保存する
    </button>

    <script async src="https://docs.opencv.org/4.8.0/opencv.js" type="text/javascript"></script>
    <script src="script.js"></script>
</body>
</html>
